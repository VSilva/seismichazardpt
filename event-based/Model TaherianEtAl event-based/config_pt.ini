# References and Citation
# Please use this citation when the OpenQuake input files are used:
# Danciu ,et al (2021) - https://doi.org/10.12686/a15
# contact:
# laurentiu.danciu[at]sed.ethz.ch
[general]
description = ESHM20 - Taherian et al. 2025 - event-based
calculation_mode = event_based
random_seed = 23

[geometry]

[logic_tree]
number_of_logic_tree_samples = 1000

[erf]
rupture_mesh_spacing = 5
complex_fault_mesh_spacing = 5
width_of_mfd_bin = 0.1
area_source_discretization = 5

[site_params]
reference_vs30_type = measured
reference_vs30_value = 800.0
site_model_file = eshm20_site_model.csv

reference_depth_to_1pt0km_per_sec = 30.0

[calculation]
source_model_logic_tree_file = source_model_logic_tree_eshm20_pt.xml
gsim_logic_tree_file = gmpe_complete_logic_tree_pt.xml
#gsim_logic_tree_file =  gmmLT.xml

intensity_measure_types_and_levels = {"PGA": logscale(0.0005, 3.00, 25),
                                      "SA(0.05)": logscale(0.0005, 5.00, 25),
                                      "SA(0.10)": logscale(0.0005, 5.00, 25),
                                      "SA(0.15)": logscale(0.0005, 5.00, 25),
                                      "SA(0.20)": logscale(0.0005, 5.00, 25),
                                      "SA(0.25)": logscale(0.0005, 5.00, 25),
                                      "SA(0.30)": logscale(0.0005, 5.00, 25),
                                      "SA(0.35)": logscale(0.0005, 5.00, 25),
                                      "SA(0.40)": logscale(0.0005, 4.00, 25),
                                      "SA(0.50)": logscale(0.0005, 4.00, 25),
                                      "SA(0.60)": logscale(0.0005, 4.00, 25),
                                      "SA(0.75)": logscale(0.0005, 4.00, 25),
                                      "SA(1.00)": logscale(0.0005, 3.00, 25),
                                      "SA(2.00)": logscale(0.0005, 2.00, 25),
                                      "SA(3.00)": logscale(0.0005, 1.00, 25),
                                      "SA(4.00)": logscale(0.0005, 1.00, 25)}
                                   
truncation_level = 5
investigation_time = 100
ses_per_logic_tree_path = 5
number_of_logic_tree_paths = 0
minimum_intensity = 0.05

maximum_distance = 600
ps_grid_spacing = 50.0

[output]
export_dir = output/
mean_hazard_curves = true
uniform_hazard_spectra = 
hazard_maps = true
quantile_hazard_curves = 0.05 0.95
poes = 0.002105 0.000404